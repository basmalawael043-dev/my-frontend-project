 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us</title>
  <link rel="stylesheet" href="Styles.css">
</head>

<body>

  <!-- Header -->
  <header class="site-header">
    <div class="container header-inner">
       <div class="header-left">
      <img src="images/Logo.jpg" alt="Basbosa Tech">
      <span class="site-name">
        Basbosa<span>Tech</span>
      </span>
    </div>
    <!-- CENTER: NAV -->
     <nav class="header-nav">
      <a href="index.html"><strong>Home</strong></a>
      
      <a href="Contact.html"><strong>Contact</strong></a>
      <a href="Cart.html"><strong>Cart</strong></a>
    </nav>


    <!-- RIGHT: ICONS -->
    <div class="header-icons">

      <!-- Search -->
      <span class="icon">
        <svg viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="16" y1="16" x2="22" y2="22"></line>
        </svg>
      </span>

      <!-- User -->
      <span class="icon">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="8" r="4"></circle>
          <path d="M4 22c0-4 4-6 8-6s8 2 8 6"></path>
        </svg>
      </span>

      <!-- Cart -->
      <span class="icon">
        <svg viewBox="0 0 24 24">
          <circle cx="9" cy="21" r="1"></circle>
          <circle cx="18" cy="21" r="1"></circle>
          <path d="M1 1h4l2.5 13h11l2-8H6"></path>
        </svg>
      </span>

      <!-- Menu -->
      <span class="icon">
        <svg viewBox="0 0 24 24">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </span>


       
  </header>

  <!-- Contact Section -->
  <section class="contact-page container">
    <h2 class="section-title">Get In Touch</h2>

    <div class="contact-wrapper">

      <!-- Contact Info -->
      <div class="contact-info">
        <h3>Contact Information</h3>
        <p>📍 Mansoura, Aga</p>
        <p>📞 +20 1017740803</p>
        <p>✉ support@basbosatech.com</p>
      </div>

      <!-- Contact Form -->
      <form class="contact-form">
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email Address" required>
        <input type="text" placeholder="Subject">
        <textarea placeholder="Your Message" rows="5" required></textarea>
        <button type="submit">Send Message</button>
      </form>

    </div>
  </section>

  <!-- Map -->
  <section class="map-section">
    <iframe 
      src="https://www.google.com/maps?q=Mansoura,Aga&output=embed"
      allowfullscreen=""
      loading="lazy">
    </iframe>
  </section>

    <!-- FOOTER -->
  <footer class="site-footer">
    <div class="container footer-inner">
      <div>©<span id="year"></span> Basbosa Tech — All rights reserved.</div>
       
    </div>
  </footer>


  <!-- JS -->
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    document.querySelector(".contact-form").onsubmit = function(e){
      e.preventDefault();
      alert("Message sent successfully 💌");
      this.reset();
    }
  </script>

</body>
</html>
